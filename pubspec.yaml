name: studentapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  uuid: ^4.5.3
  image_picker: ^1.1.2
  shared_preferences: ^2.3.5
  intl: ^0.20.2
  video_player: ^2.10.0
  wakelock_plus: ^1.3.2
  flutter_svg: ^2.3.0
  dio: ^5.10.0
  flutter_secure_storage: ^10.3.1
  rive: ^0.13.20

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "assets/icons/app_icon_bg.png"
  adaptive_icon_foreground: "assets/icons/app_icon_adaptive_fg.png"
  remove_alpha_ios: true
  background_color_ios: "#F0F6FF"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/ReadexPro-Bold.ttf

  fonts:
    - family: ReadexPro
      fonts:
        - asset: assets/fonts/ReadexPro-Bold.ttf
          weight: 700
